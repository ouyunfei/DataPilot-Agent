services:
  datapilot-agent:
    build: .
    env_file:
      - .env
    environment:
      META_DATABASE_URL: mysql://root:datapilot_root123@mysql:3306/datapilot
      DEFAULT_MYSQL_DATA_SOURCE_URL: mysql://datapilot_ro:datapilot123@mysql:3306/datapilot
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    depends_on:
      mysql:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: datapilot
      POSTGRES_USER: datapilot
      POSTGRES_PASSWORD: datapilot123
    ports:
      - "5432:5432"
    volumes:
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: datapilot
      MYSQL_ROOT_PASSWORD: datapilot_root123
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pdatapilot_root123"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  mysql_data:
